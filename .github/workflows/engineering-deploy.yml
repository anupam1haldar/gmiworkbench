name: Engineering Deploy
on:
  workflow_dispatch:
    inputs:
      work_order_id:
        description: 'Work order id (uuid)'
        required: true
      work_order_number:
        description: 'Work order number'
        required: true
      branch:
        description: 'Branch to deploy from'
        required: true
      commit_sha:
        description: 'Commit SHA to deploy'
        required: false
        default: ''
      aws_role_arn:
        description: 'AWS IAM role ARN to assume via OIDC'
        required: false
        default: ''
      aws_region:
        description: 'AWS region'
        required: false
        default: 'us-east-1'
      deploy_target:
        description: 'Deploy target kind (amplify|apprunner|lambda|ecs)'
        required: false
        default: ''
      deployment_status_url:
        description: 'Platform deployment-status webhook URL'
        required: false
        default: ''
      deployment_status_apikey:
        description: 'Platform Supabase publishable apikey for the webhook'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

run-name: WO-${{ inputs.work_order_number }} deploy ${{ inputs.branch }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha != '' && inputs.commit_sha || inputs.branch }}
          fetch-depth: 1

      - name: Notify in_progress
        if: inputs.deployment_status_url != ''
        env:
          URL: ${{ inputs.deployment_status_url }}
          KEY: ${{ inputs.deployment_status_apikey }}
          WO: ${{ inputs.work_order_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST "$URL" \
            -H "apikey: $KEY" \
            -H "content-type: application/json" \
            -d "{\"work_order_id\":\"$WO\",\"status\":\"in_progress\",\"run_url\":\"$RUN_URL\"}" || true

      - name: Configure AWS credentials (OIDC)
        if: inputs.aws_role_arn != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: gmi-factory-deploy-${{ inputs.work_order_number }}

      - name: Deploy placeholder
        env:
          TARGET: ${{ inputs.deploy_target }}
          REGION: ${{ inputs.aws_region }}
          WO: WO-${{ inputs.work_order_number }}
        run: |
          echo "::notice::Deploying $WO to target='$TARGET' region='$REGION'"
          echo "Commit: ${{ inputs.commit_sha }}"
          echo "Branch: ${{ inputs.branch }}"
          if [ -n "$TARGET" ] && [ -n "${{ inputs.aws_role_arn }}" ]; then
            aws sts get-caller-identity || true
          fi
          echo "Placeholder deploy step — replace with per-target deploy in a follow-up."

      - name: Notify success
        if: success() && inputs.deployment_status_url != ''
        env:
          URL: ${{ inputs.deployment_status_url }}
          KEY: ${{ inputs.deployment_status_apikey }}
          WO: ${{ inputs.work_order_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST "$URL" \
            -H "apikey: $KEY" \
            -H "content-type: application/json" \
            -d "{\"work_order_id\":\"$WO\",\"status\":\"success\",\"health\":\"healthy\",\"run_url\":\"$RUN_URL\"}"

      - name: Notify failure
        if: failure() && inputs.deployment_status_url != ''
        env:
          URL: ${{ inputs.deployment_status_url }}
          KEY: ${{ inputs.deployment_status_apikey }}
          WO: ${{ inputs.work_order_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST "$URL" \
            -H "apikey: $KEY" \
            -H "content-type: application/json" \
            -d "{\"work_order_id\":\"$WO\",\"status\":\"failure\",\"error\":\"Deploy workflow failed\",\"run_url\":\"$RUN_URL\"}" || true
