name: AWS Deploy
on:
  workflow_run:
    workflows: ["Factory Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::REPLACE:role/REPLACE
          aws-region: us-east-1
      - name: No deploy target configured
        run: echo "Set a deploy target in the Factory Installation wizard."
